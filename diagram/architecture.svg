<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1060 680">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <marker id="arrow-cyan" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22d3ee"/>
    </marker>
    <marker id="arrow-yellow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fbbf24"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34d399"/>
    </marker>
    <marker id="arrow-slate" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
    <marker id="arrow-rose" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fb7185"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fb923c"/>
    </marker>
    <filter id="glow-yellow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-green">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="grad-title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <linearGradient id="grad-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1060" height="680" fill="url(#grad-bg)"/>
  <rect width="1060" height="680" fill="url(#grid)" opacity="0.5"/>

  <!-- Column backgrounds -->
  <rect x="20" y="80" width="240" height="520" rx="12" fill="none" stroke="#1e293b" stroke-width="1" stroke-dasharray="6,3"/>
  <rect x="290" y="80" width="340" height="520" rx="12" fill="none" stroke="#1e293b" stroke-width="1" stroke-dasharray="6,3"/>
  <rect x="660" y="80" width="380" height="520" rx="12" fill="none" stroke="#1e293b" stroke-width="1" stroke-dasharray="6,3"/>

  <!-- Column labels -->
  <text x="140" y="74" fill="#64748b" font-size="11" font-weight="600" text-anchor="middle" font-family="JetBrains Mono, monospace">HOOK TRIGGERS</text>
  <text x="460" y="74" fill="#64748b" font-size="11" font-weight="600" text-anchor="middle" font-family="JetBrains Mono, monospace">ROUTING ENGINE</text>
  <text x="850" y="74" fill="#64748b" font-size="11" font-weight="600" text-anchor="middle" font-family="JetBrains Mono, monospace">FEISHU OUTPUT</text>

  <!-- ===== TITLE ===== -->
  <text x="530" y="42" fill="url(#grad-title)" font-size="22" font-weight="700" text-anchor="middle" font-family="JetBrains Mono, monospace">Claude Code  →  飞书通知 Hook  架构流程</text>

  <!-- ===== COL 1: TRIGGERS ===== -->

  <!-- Notification box -->
  <rect x="40" y="110" width="200" height="72" rx="8" fill="#0f172a"/>
  <rect x="40" y="110" width="200" height="72" rx="8" fill="rgba(251,113,133,0.12)" stroke="#fb7185" stroke-width="1.5"/>
  <text x="140" y="138" fill="#fb7185" font-size="13" font-weight="700" text-anchor="middle" font-family="JetBrains Mono, monospace">Notification</text>
  <text x="140" y="156" fill="#94a3b8" font-size="10" text-anchor="middle" font-family="JetBrains Mono, monospace">系统权限弹窗，等待确认</text>
  <text x="140" y="172" fill="#64748b" font-size="9" text-anchor="middle" font-family="JetBrains Mono, monospace">PreToolUse 拦截触发</text>

  <!-- AskUserQuestion box -->
  <rect x="40" y="220" width="200" height="72" rx="8" fill="#0f172a"/>
  <rect x="40" y="220" width="200" height="72" rx="8" fill="rgba(168,85,247,0.12)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="140" y="248" fill="#a78bfa" font-size="13" font-weight="700" text-anchor="middle" font-family="JetBrains Mono, monospace">AskUserQuestion</text>
  <text x="140" y="266" fill="#94a3b8" font-size="10" text-anchor="middle" font-family="JetBrains Mono, monospace">Claude 主动提问确认</text>
  <text x="140" y="282" fill="#64748b" font-size="9" text-anchor="middle" font-family="JetBrains Mono, monospace">PostToolUse 事件触发</text>

  <!-- Stop box -->
  <rect x="40" y="330" width="200" height="72" rx="8" fill="#0f172a"/>
  <rect x="40" y="330" width="200" height="72" rx="8" fill="rgba(34,211,238,0.12)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="140" y="358" fill="#22d3ee" font-size="13" font-weight="700" text-anchor="middle" font-family="JetBrains Mono, monospace">Stop</text>
  <text x="140" y="376" fill="#94a3b8" font-size="10" text-anchor="middle" font-family="JetBrains Mono, monospace">会话结束，完整上下文</text>
  <text x="140" y="392" fill="#64748b" font-size="9" text-anchor="middle" font-family="JetBrains Mono, monospace">含 Token / 耗时 / 费用数据</text>

  <!-- ===== ARROWS: COL 1 → COL 2 ===== -->
  <path d="M 240 146 L 290 146" fill="none" stroke="#fb7185" stroke-width="2" marker-end="url(#arrow-rose)"/>
  <path d="M 240 256 L 290 256" fill="none" stroke="#a78bfa" stroke-width="2" marker-end="url(#arrow-slate)"/>
  <path d="M 240 366 L 290 366" fill="none" stroke="#22d3ee" stroke-width="2" marker-end="url(#arrow-cyan)"/>

  <!-- ===== COL 2: ROUTING ENGINE ===== -->

  <!-- feishu-notify.sh Main Box -->
  <rect x="290" y="100" width="200" height="40" rx="6" fill="#0f172a"/>
  <rect x="290" y="100" width="200" height="40" rx="6" fill="rgba(148,163,184,0.1)" stroke="#64748b" stroke-width="1"/>
  <text x="390" y="125" fill="#e2e8f0" font-size="12" font-weight="700" text-anchor="middle" font-family="JetBrains Mono, monospace">feishu-notify.sh</text>

  <!-- feishu-ask.sh Box -->
  <rect x="320" y="175" width="140" height="36" rx="6" fill="#0f172a"/>
  <rect x="320" y="175" width="140" height="36" rx="6" fill="rgba(22,163,74,0.1)" stroke="#64748b" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="390" y="198" fill="#94a3b8" font-size="10" font-weight="600" text-anchor="middle" font-family="JetBrains Mono, monospace">feishu-ask.sh</text>

  <!-- Decision Diamond -->
  <g transform="translate(390, 285)">
    <polygon points="0,-38 50,0 0,38 -50,0" fill="#0f172a"/>
    <polygon points="0,-38 50,0 0,38 -50,0" fill="rgba(251,191,36,0.15)" stroke="#fbbf24" stroke-width="1.5"/>
    <text y="4" fill="#fbbf24" font-size="10" font-weight="600" text-anchor="middle" font-family="JetBrains Mono, monospace">PROMPT?</text>
    <text y="-15" fill="#94a3b8" font-size="8" text-anchor="middle" font-family="JetBrains Mono, monospace">$CLAUDE_</text>
    <text y="-5" fill="#94a3b8" font-size="8" text-anchor="middle" font-family="JetBrains Mono, monospace">PERMISSION</text>
  </g>

  <!-- Arrows into decision -->
  <path d="M 390 140 L 390 175" fill="none" stroke="#64748b" stroke-width="1.5"/>
  <path d="M 390 211 L 390 247" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow-slate)"/>

  <!-- ASK Path (yellow, left branch) -->
  <path d="M 340 285 L 210 285 L 210 520 L 310 520 L 340 520" fill="none" stroke="#fbbf24" stroke-width="2" marker-end="url(#arrow-yellow)"/>
  <text x="260" y="277" fill="#fbbf24" font-size="10" font-weight="600" text-anchor="middle" font-family="JetBrains Mono, monospace">YES → ASK</text>

  <!-- DONE Path (green, right branch) -->
  <path d="M 440 285 L 570 285 L 570 440 L 520 440 L 520 530" fill="none" stroke="#34d399" stroke-width="2"/>
  <text x="500" y="277" fill="#34d399" font-size="10" font-weight="600" text-anchor="middle" font-family="JetBrains Mono, monospace">NO → DONE</text>

  <!-- ASK Decision Box -->
  <rect x="260" y="495" width="180" height="48" rx="6" fill="#0f172a"/>
  <rect x="260" y="495" width="180" height="48" rx="6" fill="rgba(251,191,36,0.1)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="350" y="516" fill="#fbbf24" font-size="11" font-weight="700" text-anchor="middle" font-family="JetBrains Mono, monospace">ASK Channel</text>
  <text x="350" y="533" fill="#94a3b8" font-size="9" text-anchor="middle" font-family="JetBrains Mono, monospace">黄色卡片 · 提醒操作</text>

  <!-- DONE Decision Box -->
  <rect x="430" y="505" width="180" height="48" rx="6" fill="#0f172a"/>
  <rect x="430" y="505" width="180" height="48" rx="6" fill="rgba(52,211,153,0.1)" stroke="#34d399" stroke-width="1.5"/>
  <text x="520" y="526" fill="#34d399" font-size="11" font-weight="700" text-anchor="middle" font-family="JetBrains Mono, monospace">DONE Channel</text>
  <text x="520" y="543" fill="#94a3b8" font-size="9" text-anchor="middle" font-family="JetBrains Mono, monospace">绿色卡片 · 完整摘要</text>

  <!-- Mode Decision -->
  <g transform="translate(520, 585)">
    <polygon points="0,-22 32,0 0,22 -32,0" fill="#0f172a"/>
    <polygon points="0,-22 32,0 0,22 -32,0" fill="rgba(251,146,60,0.15)" stroke="#fb923c" stroke-width="1.5"/>
    <text y="4" fill="#fb923c" font-size="9" font-weight="600" text-anchor="middle" font-family="JetBrains Mono, monospace">API?</text>
  </g>

  <!-- Mode branches -->
  <path d="M 552 585 L 580 585" fill="none" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="566" y="579" fill="#34d399" font-size="9" font-weight="600" font-family="JetBrains Mono, monospace">Y</text>

  <path d="M 488 585 L 240 585 L 240 620 L 160 620 L 160 600" fill="none" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow-slate)"/>
  <text x="472" y="579" fill="#94a3b8" font-size="9" font-weight="600" font-family="JetBrains Mono, monospace">N</text>

  <!-- Fallback label -->
  <text x="160" y="635" fill="#64748b" font-size="9" font-weight="500" text-anchor="middle" font-family="JetBrains Mono, monospace">Webhook 降级</text>

  <!-- ===== COL 3: FEISHU OUTPUT ===== -->

  <!-- ASK Card Output -->
  <rect x="660" y="110" width="280" height="130" rx="8" fill="#0f172a"/>
  <rect x="660" y="110" width="280" height="130" rx="8" fill="rgba(251,191,36,0.08)" stroke="#fbbf24" stroke-width="2" filter="url(#glow-yellow)"/>
  <!-- Card header -->
  <rect x="660" y="110" width="280" height="34" rx="8" fill="#0f172a"/>
  <rect x="660" y="110" width="280" height="34" rx="8" fill="rgba(251,191,36,0.2)"/>
  <rect x="660" y="136" width="280" height="8" fill="rgba(251,191,36,0.2)"/>
  <text x="800" y="132" fill="#fbbf24" font-size="12" font-weight="700" text-anchor="middle" font-family="JetBrains Mono, monospace">需要你的操作</text>

  <!-- Mini card content -->
  <text x="678" y="168" fill="#fbbf24" font-size="10" font-family="JetBrains Mono, monospace">任务</text>
  <rect x="720" y="158" width="205" height="14" rx="3" fill="rgba(148,163,184,0.15)"/>
  <text x="678" y="188" fill="#fbbf24" font-size="10" font-family="JetBrains Mono, monospace">目录</text>
  <rect x="720" y="178" width="205" height="14" rx="3" fill="rgba(148,163,184,0.15)"/>
  <text x="678" y="208" fill="#fbbf24" font-size="10" font-family="JetBrains Mono, monospace">模型</text>
  <rect x="720" y="198" width="205" height="14" rx="3" fill="rgba(148,163,184,0.15)"/>
  <text x="678" y="228" fill="#64748b" font-size="9" font-family="JetBrains Mono, monospace">回到终端查看并处理 ...</text>

  <!-- DONE Card Output -->
  <rect x="660" y="320" width="280" height="170" rx="8" fill="#0f172a"/>
  <rect x="660" y="320" width="280" height="170" rx="8" fill="rgba(52,211,153,0.08)" stroke="#34d399" stroke-width="2" filter="url(#glow-green)"/>
  <!-- Card header -->
  <rect x="660" y="320" width="280" height="34" rx="8" fill="#0f172a"/>
  <rect x="660" y="320" width="280" height="34" rx="8" fill="rgba(52,211,153,0.2)"/>
  <rect x="660" y="346" width="280" height="8" fill="rgba(52,211,153,0.2)"/>
  <text x="800" y="342" fill="#34d399" font-size="12" font-weight="700" text-anchor="middle" font-family="JetBrains Mono, monospace">任务执行完成</text>

  <!-- Mini card content -->
  <text x="678" y="378" fill="#34d399" font-size="10" font-family="JetBrains Mono, monospace">任务</text>
  <rect x="720" y="368" width="205" height="14" rx="3" fill="rgba(148,163,184,0.15)"/>
  <text x="678" y="398" fill="#34d399" font-size="10" font-family="JetBrains Mono, monospace">目录</text>
  <rect x="720" y="388" width="205" height="14" rx="3" fill="rgba(148,163,184,0.15)"/>
  <text x="678" y="418" fill="#34d399" font-size="10" font-family="JetBrains Mono, monospace">Token</text>
  <rect x="720" y="408" width="205" height="14" rx="3" fill="rgba(148,163,184,0.15)"/>
  <text x="678" y="438" fill="#34d399" font-size="10" font-family="JetBrains Mono, monospace">费用</text>
  <rect x="720" y="428" width="205" height="14" rx="3" fill="rgba(148,163,184,0.15)"/>
  <text x="678" y="458" fill="#34d399" font-size="10" font-family="JetBrains Mono, monospace">耗时</text>
  <rect x="720" y="448" width="205" height="14" rx="3" fill="rgba(148,163,184,0.15)"/>

  <!-- Delete indicator -->
  <rect x="660" y="510" width="280" height="48" rx="8" fill="#0f172a"/>
  <rect x="660" y="510" width="280" height="48" rx="8" fill="rgba(248,113,113,0.08)" stroke="#f87171" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="800" y="533" fill="#f87171" font-size="11" font-weight="700" text-anchor="middle" font-family="JetBrains Mono, monospace">60s 后自动删除</text>
  <text x="800" y="549" fill="#64748b" font-size="9" text-anchor="middle" font-family="JetBrains Mono, monospace">后台子进程 → DELETE /im/v1/messages</text>

  <!-- ===== ARROWS: COL 2 → COL 3 ===== -->

  <!-- ASK arrow -->
  <path d="M 440 519 L 660 175" fill="none" stroke="#fbbf24" stroke-width="2" marker-end="url(#arrow-yellow)" stroke-dasharray="6,3"/>
  <text x="520" y="345" fill="#fbbf24" font-size="9" font-weight="600" text-anchor="middle" font-family="JetBrains Mono, monospace">FEISHU_WEBHOOK_ASK_URL</text>

  <!-- DONE arrow -->
  <path d="M 610 529 L 660 405" fill="none" stroke="#34d399" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="635" y="475" fill="#34d399" font-size="9" font-weight="600" text-anchor="middle" font-family="JetBrains Mono, monospace">FEISHU_WEBHOOK_DONE_URL</text>

  <!-- ===== LEGEND ===== -->
  <rect x="40" y="595" width="200" height="70" rx="8" fill="#0f172a" opacity="0.8"/>
  <rect x="40" y="595" width="200" height="70" rx="8" fill="none" stroke="#1e293b" stroke-width="1"/>

  <circle cx="62" cy="618" r="5" fill="#fb7185"/>
  <text x="76" y="622" fill="#94a3b8" font-size="10" font-family="JetBrains Mono, monospace">Notification  Hook</text>

  <circle cx="62" cy="638" r="5" fill="#a78bfa"/>
  <text x="76" y="642" fill="#94a3b8" font-size="10" font-family="JetBrains Mono, monospace">PostToolUse  Hook</text>

  <circle cx="62" cy="658" r="5" fill="#22d3ee"/>
  <text x="76" y="662" fill="#94a3b8" font-size="10" font-family="JetBrains Mono, monospace">Stop  Hook</text>

  <!-- Date stamp -->
  <text x="530" y="675" fill="#334155" font-size="9" text-anchor="middle" font-family="JetBrains Mono, monospace">Claude Code  ·  Feishu Notify Hook  ·  2026</text>

</svg>
