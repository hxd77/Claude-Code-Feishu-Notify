<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="cc" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="fs" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3370ff"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <linearGradient id="arrow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d97706"/>
      <stop offset="30%" stop-color="#f59e0b"/>
      <stop offset="70%" stop-color="#3370ff"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" rx="16" fill="url(#bg)"/>

  <!-- Claude Code icon (simplified) -->
  <g transform="translate(120, 100)" filter="url(#glow)">
    <rect x="-45" y="-35" width="90" height="70" rx="14" fill="#0f172a" stroke="url(#cc)" stroke-width="2.5"/>
    <text x="0" y="-8" fill="#f59e0b" font-size="24" font-weight="700" text-anchor="middle" font-family="JetBrains Mono, monospace">&lt;/&gt;</text>
    <text x="0" y="18" fill="#d97706" font-size="9" font-weight="600" text-anchor="middle" font-family="JetBrains Mono, monospace">CLAUDE</text>
  </g>

  <!-- Arrow bridge -->
  <g>
    <path d="M 190 100 L 270 100" fill="none" stroke="url(#arrow)" stroke-width="3" stroke-linecap="round"/>
    <polygon points="270,92 288,100 270,108" fill="#60a5fa"/>
    <!-- Pulse dots -->
    <circle cx="210" cy="100" r="3" fill="#f59e0b" opacity="0.8">
      <animate attributeName="opacity" values="0.8;0.2;0.8" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="235" cy="100" r="3" fill="#3370ff" opacity="0.5">
      <animate attributeName="opacity" values="0.5;0.9;0.5" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Feishu icon (simplified bird/message) -->
  <g transform="translate(380, 100)" filter="url(#glow)">
    <rect x="-45" y="-35" width="90" height="70" rx="14" fill="#0f172a" stroke="url(#fs)" stroke-width="2.5"/>
    <!-- Stylized message/bird shape -->
    <path d="M -18 -5 L 0 -18 L 18 -5 L 10 5 L 18 20 L 0 12 L -18 20 L -10 5 Z" fill="none" stroke="#60a5fa" stroke-width="2" stroke-linejoin="round"/>
    <text x="0" y="30" fill="#3370ff" font-size="9" font-weight="600" text-anchor="middle" font-family="JetBrains Mono, monospace">FEISHU</text>
  </g>

  <!-- Title text -->
  <text x="510" y="85" fill="white" font-size="28" font-weight="700" font-family="JetBrains Mono, monospace">Claude Code</text>
  <text x="510" y="115" fill="url(#accent)" font-size="14" font-weight="600" font-family="JetBrains Mono, monospace">Feishu Notify Hook</text>

  <!-- Subtitle -->
  <text x="510" y="145" fill="#64748b" font-size="11" font-weight="400" font-family="JetBrains Mono, monospace">实时通知  双通道  阅后即焚</text>

  <!-- Bottom line -->
  <rect x="400" y="175" width="300" height="1" rx="0.5" fill="url(#accent)" opacity="0.3"/>
</svg>
